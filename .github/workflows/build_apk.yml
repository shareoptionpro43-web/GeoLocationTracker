name: Build & Release APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease --stacktrace 2>&1 | tee release_build.log; exit ${PIPESTATUS[0]}

      - name: Show KSP errors if build failed
        if: failure()
        run: |
          echo "=== KSP / Kotlin errors ==="
          grep -E "error:|warning:|What went wrong|Caused by|\.kt:" release_build.log | head -60 || true
          echo "=== Full last 80 lines ==="
          tail -80 release_build.log || true

      - name: List APK output files
        run: find app/build/outputs/apk -name "*.apk" | sort

      - name: Rename Debug APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/GeoLocationTracker-debug.apk

      - name: Rename Release APK
        run: |
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Found release APK: $RELEASE_APK"
          mv "$RELEASE_APK" app/build/outputs/apk/release/GeoLocationTracker-release.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GeoLocationTracker-DEBUG
          path: app/build/outputs/apk/debug/GeoLocationTracker-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: GeoLocationTracker-RELEASE
          path: app/build/outputs/apk/release/GeoLocationTracker-release.apk
          retention-days: 30

      - name: Create GitHub Release (on push to main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "GeoLocationTracker v1.0.${{ github.run_number }}"
          body: |
            ## 📱 Geo Location Tracker APK
            Auto-built from commit `${{ github.sha }}`

            ### Download:
            - **GeoLocationTracker-debug.apk** — install directly, no signing needed
            - **GeoLocationTracker-release.apk** — optimized release build

            ### Install instructions:
            1. Download the APK to your Android phone
            2. Go to Settings → Security → Enable "Install unknown apps"
            3. Open the APK file and install
          files: |
            app/build/outputs/apk/debug/GeoLocationTracker-debug.apk
            app/build/outputs/apk/release/GeoLocationTracker-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
